content: |
  This post originally appeared on my old blog and depends heavily on images, screenshots, and formatting from that page. I am keeping the full version there rather than recreating it here.

  It is definitely an early piece, but I still like the underlying idea: taking a weird biology question too seriously and following it until it turns into something more philosophical than expected.
