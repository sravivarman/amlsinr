short_summary: >
  This was a blog post that I wrote my senior year in high school for a creative writing class. 
  I've been told that I have a way with words, and sometimes the choice words that I decide to use are
  not always the ones that I should be using. Because I know so many words that it takes 
  so long to decide which one/ones I should actually use, sort of like how when you're standing in the Dairy store 
  holding up the line because there's so many options.


  I edited this text slightly so that it doesn't sound like its written by a high schooler, but the original version 
  is still live on the link below.

content: |
  So I'm not good with words. Like at all. And I've realized that I'm at a point in my life where I know too many words 
  for my own good. I literally think in big words now. Every now and then when I'm writing, I'll catch myself 
  typing something like "I've accrued over 40 hours at this program" or "I personally feel that I am a person with very few 
  vices" and I just think; "wow, whoever that guy is he sure as hell knows what he's talking about, because I sure as hell 
  don't!"


  Other times, when I'm trying to talk to someone or write an essay, I just get stuck replaying a sentence because I 
  literally can't find the right word. It's like when you're picking out ice cream at an ice cream place. When you're 
  at an ice cream stand, it's easy to pick out the flavor you want cause there's only like 5 options (4 if you remember 
  to always subconsciously rule out mint chocolate chip). It reminds me of when I was in 1st grade writing about my 
  Wii during writing workshop. There isn't anything inherently complex about writing about a Nintendo Wii; there's no crazy 
  deep universal themes or complex rhetoric used by the author to showcase control of the writing situation. No, when you 
  write about a Wii as a 1st grader, you just gotta use all the happy words: good, nice, cool, funny, maybe even an exciting 
  if you're feeling particularly overjoyed. 


  The words basically went directly from my brain to the page because I knew every word so well. I may not have tasted every 
  specific flavor of happy out there, but I knew exactly what each one I did taste actually tasted like.


  It's not until I started to read and consume more content that the flavor profiles of each individual word started to blur. 
  It's only then that my brain would start taking like 10 minutes to place its order, holding up the line for the rest of my 
  thoughts, and also wasting the time I could be using to actually write a better essay. 


  Having to write college apps right now, I've finally started to realize the power of simpler words. 
  Sometimes the only thing you need to satisfy that sweet tooth is some plain old chocolate. 
