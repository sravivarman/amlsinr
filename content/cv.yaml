  - date: "April 13, 2024"
    category: "Research"
    title: "Characterizing Promoters for Terpene Production in Sorghum"
    organization: "Hamberger Lab, Michigan State University"
    description: |
      Designed and presented a research poster for work under Angel McKay Whiteman in the Hamberger Lab, led by PI Bjorn Hamberger.

      The project characterized promoter candidates and transient expression methods for targeting gene expression to the sorghum epidermis or cuticle, with potential applications in terpene production, synthetic biology, and bioenergy crop development.

      [View poster](../pdf/sorghum-poster.pdf)

