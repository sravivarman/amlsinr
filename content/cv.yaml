  - date: "April 2023-April 2025"
    category: "Research"
    title: "Dean's Research Scholar"
    organization: "Michigan State University College of Natural Science"
    description: |
      Selected as one of ten students to represent the College of Natural Science at alumni engagements and university-affiliated events.

      Trained to communicate research experiences to general audiences, including independent psychology research in the Cesario Lab and collaborative plant biotechnology work in the Hamberger Lab.

  - date: "December 2023-April 2025"
    category: "Research"
    title: "Independent Researcher"
    organization: "Cesario Lab, Michigan State University"
    description: |
      Conducted independent research on Bayesian conditional probabilities and their role in modeling stereotypes, focusing on how a trait's diagnostic ratio relates to its categorization as a stereotype, counterstereotype, or non-stereotype for a social group.

      Completed proposal approval, preliminary data collection, and analysis using R and Python.

  - date: "August 2023-May 2025"
    category: "Research"
    title: "Undergraduate Research Assistant"
    organization: "Hamberger Lab, Michigan State University"
    description: |
      Characterized regulatory elements that target gene expression to the epidermis or cuticle of sorghum using transient expression.

      Supported work intended to target terpene production to the epidermis or thick hydrophobic cuticle of sorghum, improving ease of extraction and purification. Gained experience with DNA/RNA extraction and purification, PCR, genetic marker analysis, experimental trials, and data analysis.

  - date: "January 2024-January 2025"
    category: "Leadership & Mentorship"
    title: "Vice President of Programming"
    organization: "Phi Delta Epsilon Medical Fraternity"
    description: |
      Helped organize programming and community-building within the MI Zeta chapter of the Phi Delta Epsilon Medical Fraternity at Michigan State University.

      Restructured programming leadership and created a four-year programming plan to improve continuity and engagement across cohorts. Created shared resources for chapter members to support mentorship, professional development, and community service.

