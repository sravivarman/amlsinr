{% extends "base.html" %}

{% block content %}
<section class="section page-intro">
  <p class="page-kicker">About</p>
  <h1>{{ about_page.title }}</h1>
  {% if about_page.summary %}
  <p class="page-summary">{{ about_page.summary }}</p>
  {% endif %}
</section>

<section class="section">
  <h2>Story</h2>
  <div class="story-stack">
    {% for section in about_page.sections %}
    <article class="story-block">
      <h3>{{ section.title }}</h3>
      <div class="article-content">{{ section.body | safe }}</div>
    </article>
    {% endfor %}
  </div>
</section>
{% endblock %}
