{% if student.featured_video_embed_url %}
<section class="section featured-video-section" aria-label="Featured research video">
  <div class="featured-video-frame">
    <iframe
      src="{{ student.featured_video_embed_url }}"
      title="Featured research video"
      loading="lazy"
      allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
      allowfullscreen>
    </iframe>
  </div>
</section>
{% endif %}
