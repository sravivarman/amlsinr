<section id="contact" class="section contact-section">
  <h2>Contact</h2>
  <div class="contact-layout">
    <form class="contact-form" action="{{ student.formspree_endpoint }}" method="POST">
      <input type="hidden" name="_subject" value="Portfolio contact from arkeshdas.github.io">
      <label>
        Name
        <input type="text" name="name" autocomplete="name" required>
      </label>
      <label>
        Email
        <input type="email" name="email" autocomplete="email" required>
      </label>
      <label>
        Message
        <textarea name="message" rows="5" required></textarea>
      </label>
      <button type="submit" class="btn btn-primary">Send Message</button>
    </form>

    <ul class="contact-list">
      {% if student.email %}
      <li>
        <a href="mailto:{{ student.email }}" class="contact-card">
          <span class="contact-label">Email</span>
          <span>{{ student.email }}</span>
        </a>
      </li>
      {% endif %}
      {% if student.linkedin %}
      <li>
        <a href="{{ student.linkedin }}" target="_blank" rel="noopener" class="contact-card">
          <span class="contact-label">LinkedIn</span>
          <span>{{ student.name }}</span>
        </a>
      </li>
      {% endif %}
      {% if student.github %}
      <li>
        <a href="{{ student.github }}" target="_blank" rel="noopener" class="contact-card">
          <span class="contact-label">GitHub</span>
          <span>{{ student.github | replace("https://github.com/", "") }}</span>
        </a>
      </li>
      {% endif %}
    </ul>
  </div>
</section>
