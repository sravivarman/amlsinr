{% macro render_media(media_items, placement, site_root, context_class="") %}
{% for item in media_items if item.placement|default("after_summary") == placement %}
<figure class="post-media post-media-{{ item.size|default('medium') }} post-media-{{ item.align|default('center') }} {{ context_class }}">
  <img src="{{ site_root }}{{ item.path }}" alt="{{ item.alt|default('') }}">
  {% if item.caption %}
  <figcaption>{{ item.caption }}</figcaption>
  {% endif %}
</figure>
{% endfor %}
{% endmacro %}
